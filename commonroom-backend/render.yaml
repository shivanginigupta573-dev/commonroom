services:
  - type: web
    name: commonroom-backend
    env: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn commonroom_backend.wsgi:application"
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: commonroom_backend.settings_production
      - key: PYTHON_VERSION
        value: 3.13.5